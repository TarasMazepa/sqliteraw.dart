name: sample-dart-test.yml

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  sample-dart-test-ubuntu-24-04-arm:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - id: get-dart-version
        run: echo "dart_sdk_version=$(cat DART_SDK_VERSION)" >> $GITHUB_OUTPUT

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ steps.get-dart-version.outputs.dart_sdk_version }}

      - run: |
          if command -v clang >/dev/null; then
            echo "Using $(command -v clang)"
          elif command -v clang-18 >/dev/null; then
            sudo ln -sfn "$(command -v clang-18)" /usr/local/bin/clang
            sudo ln -sfn "$(command -v clang++-18)" /usr/local/bin/clang++
          else
            sudo apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
              -o Acquire::Retries=5 \
              -o Acquire::ForceIPv4=true \
              clang-18
            sudo ln -sfn "$(command -v clang-18)" /usr/local/bin/clang
            sudo ln -sfn "$(command -v clang++-18)" /usr/local/bin/clang++
          fi

      - run: dart pub get
        working-directory: sqliteraw

      - run: dart run ffigen
        working-directory: sqliteraw

      - run: dart pub get
        working-directory: sample/dart

      - run: dart test
        working-directory: sample/dart

  sample-dart-test-ubuntu-latest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: get-dart-version
        run: echo "dart_sdk_version=$(cat DART_SDK_VERSION)" >> $GITHUB_OUTPUT

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ steps.get-dart-version.outputs.dart_sdk_version }}

      - run: |
          if command -v clang >/dev/null; then
            echo "Using $(command -v clang)"
          elif command -v clang-18 >/dev/null; then
            sudo ln -sfn "$(command -v clang-18)" /usr/local/bin/clang
            sudo ln -sfn "$(command -v clang++-18)" /usr/local/bin/clang++
          else
            sudo apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
              -o Acquire::Retries=5 \
              -o Acquire::ForceIPv4=true \
              clang-18
            sudo ln -sfn "$(command -v clang-18)" /usr/local/bin/clang
            sudo ln -sfn "$(command -v clang++-18)" /usr/local/bin/clang++
          fi

      - run: dart pub get
        working-directory: sqliteraw

      - run: dart run ffigen
        working-directory: sqliteraw

      - run: dart pub get
        working-directory: sample/dart

      - run: dart test
        working-directory: sample/dart
