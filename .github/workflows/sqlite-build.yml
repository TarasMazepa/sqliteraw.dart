name: sqlite-build.yml

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

env:
  SQLITE_COMPILE_TIME_OPTIONS: >-
    -O3
    -DSQLITE_ENABLE_FTS4
    -DSQLITE_ENABLE_FTS5
    -DSQLITE_ENABLE_RTREE
    -DSQLITE_ENABLE_GEOPOLY

jobs:
  sqlite-build-ubuntu-24-04-arm:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - run: |
          if command -v clang >/dev/null; then
            echo "Using $(command -v clang)"
          elif command -v clang-18 >/dev/null; then
            sudo ln -sfn "$(command -v clang-18)" /usr/local/bin/clang
            sudo ln -sfn "$(command -v clang++-18)" /usr/local/bin/clang++
          else
            sudo apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
              -o Acquire::Retries=5 \
              -o Acquire::ForceIPv4=true \
              clang-18
            sudo ln -sfn "$(command -v clang-18)" /usr/local/bin/clang
            sudo ln -sfn "$(command -v clang++-18)" /usr/local/bin/clang++
          fi

      - run: |
          clang -fPIC -shared \
            ${{ env.SQLITE_COMPILE_TIME_OPTIONS }} \
            sqlite/sqlite3.c \
            -lpthread -ldl -lm \
            -o "sqlite3.so"
          
          clang \
            ${{ env.SQLITE_COMPILE_TIME_OPTIONS }} \
            sqlite/sqlite3.c sqlite/shell.c \
            -lpthread -ldl -lm \
            -o "sqlite3"
          
          ./sqlite3 --version

  sqlite-build-ubuntu-latest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: |
          if command -v clang >/dev/null; then
            echo "Using $(command -v clang)"
          elif command -v clang-18 >/dev/null; then
            sudo ln -sfn "$(command -v clang-18)" /usr/local/bin/clang
            sudo ln -sfn "$(command -v clang++-18)" /usr/local/bin/clang++
          else
            sudo apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
              -o Acquire::Retries=5 \
              -o Acquire::ForceIPv4=true \
              clang-18
            sudo ln -sfn "$(command -v clang-18)" /usr/local/bin/clang
            sudo ln -sfn "$(command -v clang++-18)" /usr/local/bin/clang++
          fi

      - run: |
          clang -fPIC -shared \
            ${{ env.SQLITE_COMPILE_TIME_OPTIONS }} \
            sqlite/sqlite3.c \
            -lpthread -ldl -lm \
            -o "sqlite3.so"
          
          clang \
            ${{ env.SQLITE_COMPILE_TIME_OPTIONS }} \
            sqlite/sqlite3.c sqlite/shell.c \
            -lpthread -ldl -lm \
            -o "sqlite3"
          
          ./sqlite3 --version
